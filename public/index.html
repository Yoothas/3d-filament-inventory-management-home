<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Filament Inventory</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>🎯 3D Filament Inventory</h1>
            <div class="header-actions">
                <button id="refreshBtn" class="btn btn-secondary" title="Refresh inventory">↻ Refresh</button>
                <button id="darkModeToggle" class="btn btn-secondary">🌙 Dark Mode</button>
                <button id="addFilamentBtn" class="btn btn-primary">+ Add Filament</button>
            </div>
        </header>

        <div class="stats-bar">
            <div class="stat">
                <span class="stat-label">Total Spools:</span>
                <span id="totalSpools" class="stat-value">0</span>
            </div>
            <div class="stat">
                <span class="stat-label">Total Weight:</span>
                <span id="totalWeight" class="stat-value">0g</span>
            </div>
            <div class="stat">
                <span class="stat-label">Remaining Weight:</span>
                <span id="remainingWeight" class="stat-value">0g</span>
            </div>
        </div>

        <div class="search-bar">
            <input type="text" id="searchInput" placeholder="Search by brand, material, or color...">
            <select id="materialFilter">
                <option value="">All Materials</option>
                <option value="PLA">PLA</option>
                <option value="ABS">ABS</option>
                <option value="PETG">PETG</option>
                <option value="TPU">TPU</option>
                <option value="ASA">ASA</option>
                <option value="Other">Other</option>
            </select>
        </div>

        <div id="filamentsGrid" class="filaments-grid">
            <!-- Filaments will be loaded here -->
        </div>
    </div>

    <!-- Add/Edit Filament Modal -->
    <div id="filamentModal" class="modal">
        <div class="modal-content">
            <span class="close">&times;</span>
            <h2 id="modalTitle">Add New Filament</h2>
            <form id="filamentForm">
                <div class="form-group">
                    <label for="brand">Brand:</label>
                    <input type="text" id="brand" name="brand" required>
                </div>
                <div class="form-group">
                    <label for="material">Material:</label>
                    <select id="material" name="material" required>
                        <option value="">Select Material</option>
                        <option value="PLA">PLA</option>
                        <option value="ABS">ABS</option>
                        <option value="PETG">PETG</option>
                        <option value="TPU">TPU</option>
                        <option value="ASA">ASA</option>
                        <option value="Other">Other</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="color">Color:</label>
                    <input type="text" id="color" name="color" required>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label for="weight">Original Weight (g):</label>
                        <input type="number" id="weight" name="weight" min="0" step="1" required>
                    </div>
                    <div class="form-group">
                        <label for="remainingWeight">Remaining Weight (g):</label>
                        <input type="number" id="remainingWeight" name="remainingWeight" min="0" step="1">
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label for="diameter">Diameter (mm):</label>
                        <select id="diameter" name="diameter" required>
                            <option value="1.75">1.75mm</option>
                            <option value="2.85">2.85mm</option>
                            <option value="3.0">3.0mm</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="cost">Cost ($):</label>
                        <input type="number" id="cost" name="cost" min="0" step="0.01">
                    </div>
                </div>
                <div class="form-group">
                    <label for="purchaseDate">Purchase Date:</label>
                    <input type="date" id="purchaseDate" name="purchaseDate">
                </div>
                <div class="form-group">
                    <label for="notes">Notes:</label>
                    <textarea id="notes" name="notes" rows="3"></textarea>
                </div>
                <div class="form-actions">
                    <button type="button" class="btn btn-secondary" onclick="closeModal()">Cancel</button>
                    <button type="submit" class="btn btn-primary">Save Filament</button>
                </div>
            </form>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
